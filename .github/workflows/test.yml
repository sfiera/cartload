name: Run Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--experimental-vm-modules"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with: {node-version: '25'}
      - run: npm install
      - run: npm test
