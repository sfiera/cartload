<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0" y="0" width="100%" height="100%" viewBox="0 0 16 16">
  <style>
    line, ellipse {
      stroke: black;
      stroke-width: 2px;
      fill: transparent;
      stroke-linecap: round;
    }
    @media (prefers-color-scheme: dark) {
      line, ellipse { stroke: white; }
    }
  </style>
  <g transform="translate(8,8)">
    <ellipse rx="7" ry="7"/>
    <ellipse rx="2" ry="2"/>
    <line x1="2" x2="4.5" transform="rotate(0)"/>
    <line x1="2" x2="4.5" transform="rotate(45)"/>
    <line x1="2" x2="4.5" transform="rotate(90)"/>
    <line x1="2" x2="4.5" transform="rotate(135)"/>
    <line x1="2" x2="4.5" transform="rotate(180)"/>
    <line x1="2" x2="4.5" transform="rotate(225)"/>
    <line x1="2" x2="4.5" transform="rotate(270)"/>
    <line x1="2" x2="4.5" transform="rotate(315)"/>
  </g>
</svg>
